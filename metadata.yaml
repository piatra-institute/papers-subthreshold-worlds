abstract: |-
  The oldest puzzle about heaps asks for a number: at how many grains does sand become a heap? This paper argues the number was never the point, and that the heap belongs to a wide family of systems in which a latent state accumulates small changes while a coarse readout classifying it stays fixed, until at some point the readout flips. Write the state update as x_{t+1} = F(x_t, u_t) and the readout as y_t = R(x_t). The sorites condition is that for many steps R(x_{t+1}) = R(x_t) although x_{t+1} is not x_t, and the paradox is the confusion of readout-invariance with state-invariance, of a tolerance relation that is not transitive with an equivalence relation that is. The paper develops this as one architecture across five domains and grounds four of its claims in a reproducible simulation. A population of leaky integrators driven by a stream of small inputs holds the accumulated count in full, so that a linear decoder recovers it exactly, at an R-squared of 1.0 that a deterministic linear state guarantees by construction rather than reports as a finding, while the thresholded readout stays silent for the first 37 steps and carries no information at all about how much has arrived, which is the exact sense in which a subthreshold input is nothing only to the spike that has not fired. The indistinguishability relation, in which adjacent states differ by less than a just-noticeable amount, holds for every neighboring pair yet its transitive closure merges a thousand plainly distinct states into a single class, and three quarters of its chained triples already fail transitivity, so the paradox is a relation error, not a mystery about grains. A soft threshold makes local tolerance and global transition coexist without contradiction: the largest change in category probability produced by a single grain is 0.0062 while the total change across the range is 1.0. And a bistable latent state driven slowly across a fold reproduces the emergence of a new category, a spike, a heap, a multicellular individual, with the coarse readout giving no warning at all until the jump, while the variance of the latent state rises roughly 15-fold beforehand, its autocorrelation climbs from 0.9 toward 0.99, and a reservoir trained only on pre-transition data raises an alarm 198 steps before the readout moves. The synthesis is deliberately bounded. It does not solve the sorites by naming a grain number, it does not claim that neurons are heaps or that cells are reservoirs, and it takes the sheaf-theoretic reading of contextuality only as far as the honest slogan that locally adequate readouts need not glue into one global predicate. What it offers is a single formal spine, latent accumulation under coarse-grained readout, on which vagueness, psychophysics, synaptic integration, reservoir dynamics, and the major transitions of individuality can be read as one design and not five metaphors. Ships a runnable simulation whose output carries every modelled number.
